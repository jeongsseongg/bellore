<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>벨로르 · Supabase 연동 점검</title>
<style>
  body{font-family:"Apple SD Gothic Neo",system-ui,sans-serif;max-width:680px;margin:32px auto;padding:0 16px;color:#222;line-height:1.6}
  h1{font-size:20px} h2{font-size:15px;margin:24px 0 8px}
  .row{display:flex;gap:8px;align-items:center;padding:8px 12px;border:1px solid #eee;border-radius:10px;margin:6px 0;font-size:14px}
  .dot{width:10px;height:10px;border-radius:50%;background:#ccc;flex:none}
  .ok .dot{background:#1a9e54}.bad .dot{background:#d23}.run .dot{background:#e6a700}
  pre{background:#f6f6f6;padding:10px;border-radius:8px;font-size:12px;overflow:auto;white-space:pre-wrap}
  input,button{font-size:14px;padding:9px 12px;border:1px solid #ccc;border-radius:9px}
  button{background:#222;color:#fff;border:0;cursor:pointer}
  .muted{color:#888;font-size:12.5px}
  fieldset{border:1px solid #eee;border-radius:10px;margin-top:8px}
</style>
</head>
<body>
  <h1>벨로르 · Supabase 연동 점검</h1>
  <p class="muted">이 페이지는 배포된 사이트와 같은 폴더에 두고 열면 됩니다. 연동/로그인이 되는지 한눈에 확인합니다.</p>

  <h2>1) 연동 점검 (자동)</h2>
  <div id="c-config" class="row run"><span class="dot"></span><span>설정 로드</span></div>
  <div id="c-sdk" class="row run"><span class="dot"></span><span>supabase-js SDK 로드</span></div>
  <div id="c-client" class="row run"><span class="dot"></span><span>클라이언트 생성</span></div>
  <div id="c-read" class="row run"><span class="dot"></span><span>테이블 읽기 (listings)</span></div>
  <div id="c-tables" class="row run"><span class="dot"></span><span>전체 테이블 확인</span></div>

  <h2>2) 로그인 점검</h2>
  <fieldset>
    <legend>이메일/비밀번호 로그인 (관리자 계정으로 테스트하세요)</legend>
    <div style="display:flex;gap:8px;flex-wrap:wrap;padding:10px">
      <input id="email" type="email" placeholder="이메일" style="flex:1;min-width:180px">
      <input id="pw" type="password" placeholder="비밀번호" style="flex:1;min-width:140px">
      <button id="btnLogin">로그인</button>
      <button id="btnLogout" style="background:#777">로그아웃</button>
    </div>
    <div id="c-auth" class="row" style="margin:0 10px 10px"><span class="dot"></span><span>로그인 상태: 로그아웃됨</span></div>
  </fieldset>

  <h2>결과 로그</h2>
  <pre id="log"></pre>

  <!-- 실제 사이트와 동일한 설정/SDK 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
  (function(){
    var logEl=document.getElementById('log');
    function log(){ logEl.textContent += [].slice.call(arguments).join(' ')+'\n'; }
    function set(id,state,text){ var el=document.getElementById(id); el.className='row '+state; if(text) el.lastChild.textContent=text; }

    var CFG=window.BELLORE_SUPABASE||{};
    if(CFG.url && CFG.anonKey){ set('c-config','ok','설정 로드 OK — '+CFG.url); }
    else { set('c-config','bad','설정 없음 (supabase-config.js 확인)'); return; }

    if(window.supabase && window.supabase.createClient){ set('c-sdk','ok','SDK 로드 OK'); }
    else { set('c-sdk','bad','SDK 로드 실패'); return; }

    var sb;
    try{ sb=window.supabase.createClient(CFG.url,CFG.anonKey); window.sb=sb; set('c-client','ok','클라이언트 생성 OK'); }
    catch(e){ set('c-client','bad','클라이언트 생성 실패: '+e.message); return; }

    // 테이블 읽기
    sb.from('listings').select('id,category').limit(1).then(function(res){
      if(res.error){ set('c-read','bad','읽기 실패: '+res.error.message); log('listings error:',res.error.message); }
      else { set('c-read','ok','읽기 OK (행 '+(res.data?res.data.length:0)+'개 응답) — 연동 정상 ✅'); log('listings ok:',JSON.stringify(res.data)); }
    });

    // 전체 테이블 점검
    var tables=['profiles','listings','quote_requests','bids','community_posts','reviews','notifications'];
    Promise.all(tables.map(function(t){
      return sb.from(t).select('*',{count:'exact',head:true}).then(function(r){
        return t+': '+(r.error?('ERR '+r.error.message):'OK');
      });
    })).then(function(lines){
      var allOk=lines.every(function(l){return l.indexOf('OK')>-1;});
      set('c-tables', allOk?'ok':'bad', allOk?'전체 테이블 접근 OK':'일부 테이블 접근 문제(아래 로그)');
      log('--- tables ---\n'+lines.join('\n'));
    });

    // 로그인
    function showAuth(session){
      if(session && session.user){
        var u=session.user;
        sb.from('profiles').select('role,approved,display_name').eq('id',u.id).single().then(function(p){
          var role=p.data?p.data.role:'(profiles 행 없음)';
          var admin=(p.data&&p.data.role==='admin');
          set('c-auth', admin?'ok':'run', '로그인됨: '+u.email+' · role='+role+(admin?' · 관리자 ✅':' · (관리자 아니면 SQL로 role=admin 지정 필요)'));
          log('login ok:',u.email,'role=',role);
        });
      } else {
        set('c-auth','', '로그인 상태: 로그아웃됨');
      }
    }
    sb.auth.getSession().then(function(r){ showAuth(r.data.session); });
    sb.auth.onAuthStateChange(function(_e,s){ showAuth(s); });

    document.getElementById('btnLogin').onclick=function(){
      var email=document.getElementById('email').value.trim();
      var pw=document.getElementById('pw').value;
      set('c-auth','run','로그인 시도 중…');
      sb.auth.signInWithPassword({email:email,password:pw}).then(function(res){
        if(res.error){ set('c-auth','bad','로그인 실패: '+res.error.message); log('login error:',res.error.message); }
      });
    };
    document.getElementById('btnLogout').onclick=function(){ sb.auth.signOut(); };
  })();
  </script>
</body>
</html>
