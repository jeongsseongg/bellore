name: Daily DB Backup (Supabase)

# 매일 Supabase DB 전체를 덤프 → gzip → AES256 암호화 → 아티팩트로 보관.
# 데이터가 삭제/유실돼도 여기서 복구할 수 있게 하는 안전망.
#
# 동작 조건(아래 2개 시크릿을 GitHub 저장소에 등록해야 실제로 백업됨):
#   SUPABASE_DB_URL    : Supabase 대시보드 > Settings > Database >
#                        Connection string(URI, 직접 연결 5432) 전체
#   BACKUP_PASSPHRASE  : 백업 파일 복호화용 비밀문구(직접 정해서 등록·보관)
# 시크릿이 없으면 조용히 건너뜁니다(실패 알림 방지).
#
# 복구: 아티팩트(db-backup) 내려받아
#   gpg --decrypt --passphrase '비밀문구' bellore-*.sql.gz.gpg > backup.sql.gz
#   gunzip backup.sql.gz  → psql "<DB_URL>" -f backup.sql

on:
  schedule:
    - cron: '0 18 * * *'   # 매일 03:00 KST
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Guard — 시크릿 없으면 건너뜀
        id: guard
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          if [ -z "$DB_URL" ] || [ -z "$PASSPHRASE" ]; then
            echo "시크릿(SUPABASE_DB_URL / BACKUP_PASSPHRASE) 미설정 → 백업 건너뜀."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dump & encrypt
        if: steps.guard.outputs.skip != 'true'
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
        run: |
          set -euo pipefail
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          FILE="bellore-${STAMP}.sql.gz"
          # pg_dump 버전 일치를 위해 postgres:17 컨테이너 사용(Supabase 서버 버전 17.x)
          docker run --rm -e PGCONN="$DB_URL" postgres:17 \
            sh -c 'pg_dump --no-owner --no-privileges "$PGCONN"' \
            | gzip -9 > "$FILE"
          gpg --batch --yes --symmetric --cipher-algo AES256 \
            --passphrase "$PASSPHRASE" -o "${FILE}.gpg" "$FILE"
          rm -f "$FILE"
          echo "ARTIFACT=${FILE}.gpg" >> "$GITHUB_ENV"

      - name: Upload encrypted backup
        if: steps.guard.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup
          path: ${{ env.ARTIFACT }}
          retention-days: 30
