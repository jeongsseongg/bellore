name: Deploy to Firebase Hosting

# main 에 푸시될 때마다 bellore.co.kr (Firebase Hosting) 로 자동 배포합니다.
# 필요한 GitHub Secret: FIREBASE_SERVICE_ACCOUNT
#   (Firebase 콘솔 > 프로젝트 설정 > 서비스 계정 > 새 비공개 키 생성 으로 받은 JSON 전체)
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 인사이트 글(Supabase) → 정적 HTML + sitemap.xml + rss.xml 생성.
      # 실패해도 커밋된 sitemap/rss 가 폴백이라 배포는 계속된다.
      - name: Generate SEO pages (insight + sitemap + rss)
        run: node tools/generate-seo.mjs

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: newyork-watch
          channelId: live
