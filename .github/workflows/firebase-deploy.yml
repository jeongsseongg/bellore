name: Deploy to Firebase Hosting

# main 에 푸시될 때마다 bellore.co.kr (Firebase Hosting) 로 자동 배포합니다.
# 필요한 GitHub Secret: FIREBASE_SERVICE_ACCOUNT
#   (Firebase 콘솔 > 프로젝트 설정 > 서비스 계정 > 새 비공개 키 생성 으로 받은 JSON 전체)
on:
  push:
    branches: [main]
  workflow_dispatch: {}
  # 상품/글이 추가·품절돼도 자동 반영되도록 하루 1회 재생성 후 재배포.
  # (버전 누적으로 인한 호스팅 저장용량 초과를 막기 위해 6시간→1일로 축소)
  schedule:
    - cron: '0 18 * * *'   # 매일 03:00 KST

# GITHUB_TOKEN 권한 최소화(공급망/탈취 대비). 배포에는 읽기 권한이면 충분.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Supabase(인사이트·판매상품) → 정적 페이지 + sitemap/rss
      #   + 구글 머천트 피드 + 상품 CSV 생성.
      # 실패해도 커밋된 sitemap/rss 가 폴백이라 배포는 계속된다.
      - name: Generate SEO pages & feeds (insight + products)
        run: node tools/generate-seo.mjs

      # 배포 직전 옛 호스팅 버전 정리 → 저장용량 확보(429 RESOURCE_EXHAUSTED 방지).
      # 실패해도 배포는 계속 시도한다.
      - name: Prune old Hosting versions (free storage)
        continue-on-error: true
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node tools/prune-hosting.mjs

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: newyork-watch
          channelId: live
